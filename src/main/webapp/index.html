<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTOLAND — Sign In</title>
    <link rel="stylesheet" href="spa.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: auto;
            background: linear-gradient(135deg, #0a1122 0%, #0d1730 50%, #111b2e 100%);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-red), #e74c3c);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 30px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 8px 28px rgba(192, 57, 43, 0.35);
        }

        .login-card h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-white);
            margin: 0 0 4px;
        }

        .login-card .login-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .login-card .form-group {
            text-align: left;
        }

        .login-card .form-group label {
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-card .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--color-red), #a5321f);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
        }

        .login-card .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(192, 57, 43, 0.4);
        }

        .login-divider {
            height: 1px;
            background: var(--border-color);
            margin: 20px 0;
        }

        .login-footer {
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">M</div>
    <h1>MOTOLAND</h1>
    <div class="login-sub">Inventory Management System</div>

    <form action="login" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input class="form-control" type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="login-divider"></div>
    <div class="login-footer">Motoland S.A. &copy; 2026 — Authorized access only</div>
</div>

<script>
    // limpiamos session por si quedo colgada
    sessionStorage.removeItem('isLoggedIn');
    document.querySelector('form').addEventListener('submit', () => {
        // flag spa
        sessionStorage.setItem('isLoggedIn', 'true');
    });
</script>
</body>
</html>
