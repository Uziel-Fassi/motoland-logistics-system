<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - MOTOLAND</title>
    <link rel="stylesheet" href="../style.css">

    <style>
        .historial-container {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #historial-table { width:100%; margin-top:20px; border-collapse:collapse; }
        #historial-table th, #historial-table td { padding:12px 15px; border:1px solid #ddd; text-align:left; vertical-align:top; }
        #historial-table th { background-color:#003366; color:white; }
        #historial-table tbody tr:nth-of-type(even) { background-color:#f2f2f2; }
        .tipo-venta { color:#155724; font-weight:bold; }
        .tipo-compra { color:#721c24; font-weight:bold; }
        .tipo-devolucion { color:#ff8c00; font-weight:bold; }
        #search-input { width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; margin-bottom:15px; }
        .small-muted { color:#666; font-size:0.9em; }
    </style>
</head>
<body>
<div class="container">
    <header class="menu-header">
        <h1>Transaction History</h1>
        <button onclick="window.location.href='../menu.html'">Back to Menu</button>
    </header>

    <div class="historial-container">
        <input type="text" id="search-input" placeholder="Search by type, code, customer or supplier...">
        <table id="historial-table">
            <thead>
            <tr>
                <th>Type</th>
                <th>Code</th>
                <th>Date &amp; Time</th>
                <th>Detail</th>
                <th>Location</th>
                <th>Total (Bs.)</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="historial-tbody">
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const tbody = document.getElementById('historial-tbody');
        const searchInput = document.getElementById('search-input');
        let allTransactions = [];

        function renderTable(transactions) {
            tbody.innerHTML = '';
            if (!transactions || transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No transactions found.</td></tr>';
                return;
            }

            transactions.forEach(t => {
                const row = document.createElement('tr');

                let tipoClass = '';
                if (t.tipo === 'Venta') tipoClass = 'tipo-venta';
                else if (t.tipo === 'Compra') tipoClass = 'tipo-compra';
                else if (t.tipo === 'Devolución') tipoClass = 'tipo-devolucion';

                const fecha = t.fecha ? new Date(t.fecha).toLocaleString('en-US') : '';

                if (t.estado === 'Anulada') {
                    row.style.textDecoration = 'line-through';
                    row.style.color = '#888';
                }

                // ubicacion fallback
                const ubic = t.ubicacion && t.ubicacion.length ? t.ubicacion : '-';

                row.innerHTML = `
            <td><span class="${tipoClass}">${t.tipo}</span></td>
            <td>${t.codigo || 'N/A'}</td>
            <td>${fecha}</td>
            <td>${t.detalle || ''}</td>
            <td>${ubic}</td>
            <td>${(t.total || 0).toFixed(2)}</td>
            <td><b>${t.estado || ''}</b></td>
        `;
                tbody.appendChild(row);
            });
        }

        async function loadHistorial() {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Cargando...</td></tr>';
            try {
                const res = await fetch('../historial');
                if (!res.ok) {
                    // log rapido para debug
                    const text = await res.text();
                    console.error('Historial request failed. Status:', res.status, 'Response body:', text);
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">Failed to load data.</td></tr>';
                    return;
                }
                const data = await res.json();
                allTransactions = data;
                renderTable(allTransactions);
            } catch (err) {
                console.error('Error loading history:', err);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:red;">Failed to load data.</td></tr>';
            }
        }

        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim().toLowerCase();
            const filtered = allTransactions.filter(tx => {
                return (tx.tipo && tx.tipo.toLowerCase().includes(q)) ||
                    (tx.codigo && tx.codigo.toLowerCase().includes(q)) ||
                    (tx.detalle && tx.detalle.toLowerCase().includes(q)) ||
                    (tx.estado && tx.estado.toLowerCase().includes(q)) ||
                    (tx.ubicacion && tx.ubicacion.toLowerCase().includes(q));
            });
            renderTable(filtered);
        });

        loadHistorial();
    });
</script>
</body>
</html>
